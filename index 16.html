<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CSS Selector :is()/:where() Nesting Test</title>
<style>
body { background: #111; color: #eee; font-family: monospace; padding: 20px; }
#status { font-size: 1.2em; margin: 10px 0; }
</style>
</head>
<body>
<h2>CSS Selector :is()/:where() Nesting Depth Test</h2>
<p>Tests whether deeply nested :is(:is(:is(...))) selectors cause stack overflow.</p>
<div id="status">Generating payload...</div>
<div id="target" style="width:100px;height:100px;border:2px solid white;">Target</div>

<script>
// Generate deeply nested :is() selector
// div:is(div:is(div:is(...div...)))
function generateNestedIs(depth) {
  if (depth <= 0) return 'div';
  return `:is(${generateNestedIs(depth - 1)})`;
}

function generateNestedWhere(depth) {
  if (depth <= 0) return 'div';
  return `:where(${generateNestedWhere(depth - 1)})`;
}

function generateNestedNot(depth) {
  // :not(:not(:not(...div...))) — double negation returns original
  if (depth <= 0) return '.nonexistent';
  return `:not(${generateNestedNot(depth - 1)})`;
}

const depths = [100, 500, 1000, 2000, 5000];
let currentTest = 0;

function runNextTest() {
  if (currentTest >= depths.length) {
    document.getElementById('status').textContent = 'All depths survived.';
    return;
  }

  const depth = depths[currentTest];
  document.getElementById('status').textContent = `Testing depth ${depth}...`;

  requestAnimationFrame(() => {
    try {
      // Test :is() nesting
      const selector = `div${generateNestedIs(depth)}`;
      const style = document.createElement('style');
      style.textContent = `${selector} { color: red; }`;
      document.head.appendChild(style);

      // Force style recalc
      getComputedStyle(document.getElementById('target')).color;

      document.getElementById('status').textContent += ` OK (depth ${depth})`;
      currentTest++;
      setTimeout(runNextTest, 100);
    } catch(e) {
      document.getElementById('status').textContent = `Error at depth ${depth}: ${e.message}`;
    }
  });
}

// Also test :where() and :not() in parallel via separate style elements
function testAllSelectors(depth) {
  const selectors = [
    { name: ':is()', sel: `div${generateNestedIs(depth)}` },
    { name: ':where()', sel: `div${generateNestedWhere(depth)}` },
    { name: ':not()', sel: `div${generateNestedNot(depth)}` },
  ];

  for (const { name, sel } of selectors) {
    try {
      const style = document.createElement('style');
      style.textContent = `${sel} { outline: 1px solid red; }`;
      document.head.appendChild(style);
      getComputedStyle(document.getElementById('target')).outline;
    } catch(e) {
      document.getElementById('status').textContent += `\n${name} failed at depth ${depth}: ${e.message}`;
    }
  }
}

setTimeout(runNextTest, 500);
</script>
</body>
</html>
